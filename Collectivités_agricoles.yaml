components: 
  shemas: 
    Collectivite: 
    type: objet
    required:
        - id
        - nom
        - ville
        - specialiteAgricole
        - dateCreation
    properties:
        id:
          type: string
          format: uuid
          description: Identifiant unique de la collectivité
        nom:
          type: string
          description: Nom unique de la collectivité
        ville:
          type: string
          description: ville où exerce la collectivité
        specialiteAgricole:
          type: string
          description: Spécialité agricole exercée
        dateCreation:
          type: string
          format: date
          description: Date de création de la collectivité
        nombreMembres:
          type: integer
          description: Nombre total de membres inscrits
        presidentId:
          type: string
          format: uuid
          description: ID du président actuel (membre confirmé)

    Membre:
      type: object
      required:
        - id
        - nom
        - prenoms
        - dateNaissance
        - genre
        - adresse
        - telephone
        - dateAdhesion
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
        prenoms:
          type: string
        dateNaissance:
          type: string
          format: date
        genre:
          type: string
          enum: [MASCULIN, FEMININ]
        adresse:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email
        metierExerce:
          type: string
        dateAdhesion:
          type: string
          format: date
        collectiviteId:
          type: string
          format: uuid
        role:
          type: string
          enum: [PRESIDENT, PRESIDENT_ADJOINT, TRESORIER, SECRETAIRE, MEMBRE_CONFIRME, MEMBRE_JUNIOR]
        ancienneteJours:
          type: integer
          description: Nombre de jours depuis l'adhésion

    Paiement:
      type: object
      required:
        - id
        - membreId
        - montant
        - datePaiement
        - typePaiement
      properties:
        id:
          type: string
          format: uuid
        membreId:
          type: string
          format: uuid
        collectiviteId:
          type: string
          format: uuid
        montant:
          type: number
          format: decimal
          description: Montant en Ariary (MGA)
        datePaiement:
          type: string
          format: date-time
        typePaiement:
          type: string
          enum: [ADHESION, COTISATION_MENSUELLE, COTISATION_ANNUELLE, PONCTUELLE]
        modePaiement:
          type: string
          enum: [MOBILE_MONEY, VIREMENT_BANCAIRE, ESPECES]
        reference:
          type: string
          description: Référence transaction

    CompteTresorerie:
      type: object
      required:
        - id
        - collectiviteId
        - typeCompte
        - solde
      properties:
        id:
          type: string
          format: uuid
        collectiviteId:
          type: string
          format: uuid
        typeCompte:
          type: string
          enum: [CAISSE, BANQUE, MOBILE_MONEY]
        nomTitulaire:
          type: string
        detailsCompte:
          type: string
          description: "Pour banque : BRED-XXXXX / Pour mobile money : Numéro téléphone + Opérateur"
        solde:
          type: number
          format: decimal
          description: Solde actuel en MGA

    Activite:
       type: object
       required:
        - id
        - typeActivite
        - date
        - collectiviteId

       properties:
        id:
          type: string
          format: uuid
        typeActivite:
          type: string
          enum: [ASSEMBLEE_GENERALE_MENSUELLE, FORMATION_JUNIORS, ACTIVITE_EXCEPTIONNELLE]
        date:
          type: string
          format: date-time
        collectiviteId:
          type: string
          format: uuid
        obligatoire:
          type: boolean
        theme:
          type: string
          description: Optionnel pour activités exceptionnelles

    Presence:
      type: object
      required:
        - activiteId
        - membreId
        - present
      properties:
        activiteId:
          type: string
          format: uuid
        membreId:
          type: string
          format: uuid
        present:
          type: boolean
        dateEnregistrement:
          type: string
          format: date-time
        excuse:
          type: string
          description: Motif d'absence si non présent et excusé