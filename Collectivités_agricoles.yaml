        nomTitulaire:
          type: string
        detailsCompte:
          type: string
          description: >
            Obligatoire pour BANQUE et MOBILE_MONEY.
            Format BANQUE : BBBBB-GGGGG-CCCCCCCCCCC-KK.
            Format MOBILE_MONEY : numéro de téléphone + opérateur
